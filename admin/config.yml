backend:
  name: git-gateway
  branch: main

# No media uploads needed for now
media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Content"
    files:

      - name: "general"
        label: "General"
        file: "data/content.json"
        format: json
        fields:
          - { label: "First Name", name: "name_first", widget: "string" }
          - { label: "Last Name",  name: "name_last",  widget: "string" }
          - { label: "Bio / Tagline", name: "bio", widget: "text" }
          - { label: "Footer Name", name: "footer_name", widget: "string" }
          - { label: "Footer Year",  name: "footer_year", widget: "string" }

          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Project Name", name: "name",        widget: "string" }
              - { label: "URL",          name: "url",         widget: "string" }
              - { label: "Description",  name: "description", widget: "text"   }
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }

          - label: "Inducing Neurogenesis — Sprint Schedules"
            name: "sprints"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date",  name: "date",  widget: "string", hint: "e.g. week of jan 6" }
              - { label: "URL",   name: "url",   widget: "string", hint: "Link to your schedule doc" }

backend:
  name: git-gateway
  branch: main

# No media uploads needed for now
media_folder: "images"
public_folder: "/images"

collections:
  - name: "site"
    label: "Site Content"
    files:

      - name: "general"
        label: "General"
        file: "data/content.json"
        format: json
        fields:
          - { label: "First Name", name: "name_first", widget: "string" }
          - { label: "Last Name",  name: "name_last",  widget: "string" }
          - { label: "Bio / Tagline", name: "bio", widget: "text" }
          - { label: "Footer Name", name: "footer_name", widget: "string" }
          - { label: "Footer Year",  name: "footer_year", widget: "string" }

          - label: "Photo — Horizontal Position"
            name: "photo_x"
            widget: "number"
            value_type: "int"
            min: 0
            max: 100
            step: 1
            default: 35
            hint: "0 = far left, 50 = center, 100 = far right"

          - label: "Photo — Vertical Position"
            name: "photo_y"
            value_type: "int"
            widget: "number"
            min: 0
            max: 100
            step: 1
            default: 35
            hint: "0 = top of photo, 50 = middle, 100 = bottom"

          - label: "Photo — Zoom"
            name: "photo_zoom"
            widget: "number"
            value_type: "float"
            min: 1.0
            max: 2.0
            step: 0.05
            default: 1.15
            hint: "1.0 = no zoom, 1.2 = zoomed in 20%. Use to crop edges."

          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Project Name", name: "name",        widget: "string" }
              - { label: "URL",          name: "url",         widget: "string" }
              - { label: "Description",  name: "description", widget: "text"   }
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }

          - label: "Inducing Neurogenesis — Sprint Schedules"
            name: "sprints"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date",  name: "date",  widget: "string", hint: "e.g. week of jan 6" }
              - { label: "URL",   name: "url",   widget: "string", hint: "Link to your schedule doc" }

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrea Kim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Dark (default) ── */
    :root {
      --bg:        #0e0b12;
      --border:    #1e1828;
      --text:      #a89ec0;
      --dim:       #4e4568;
      --heading:   #ede7f8;
      --accent:    #e879a0;
      --accent2:   #b85278;
      --font-mono:  'DM Mono', monospace;
      --font-sans:  'DM Sans', system-ui, sans-serif;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
    }

    /* ── Light ── */
    html.light {
      --bg:        #f8faff;
      --border:    #d5ddf5;
      --text:      #3a4a72;
      --dim:       #8090b8;
      --heading:   #141e3d;
      --accent:    #c4507a;
      --accent2:   #9e3d63;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.75;
      font-weight: 300;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── Two-column layout ── */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      padding: 48px 36px 48px 40px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 32px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      transition: border-color 0.3s;
    }

    /* Name */
    .name-block { line-height: 1.1; }

    h1 {
      font-size: 36px;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 0;
    }

    h1 .name-first {
      font-family: 'Syne', var(--font-sans);
      font-style: normal;
      font-weight: 600;
      color: var(--heading);
      transition: color 0.3s;
    }

    h1 .name-last {
      font-family: 'Syne', var(--font-sans);
      font-weight: 600;
      color: var(--heading);
      transition: color 0.3s;
    }

    /* Tagline */
    .tagline {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
      line-height: 1.7;
      transition: color 0.3s;
    }

    /* Photo */
    .avatar {
      width: 100%;
      aspect-ratio: 4 / 5;
      min-height: 200px;
      border-radius: 4px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.3s;
    }

    .avatar svg {
      width: 36px;
      height: 36px;
      color: var(--dim);
      stroke-width: 1;
    }

    /* Sidebar section */
    .sidebar-section {}

    .sidebar-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
      transition: color 0.3s;
    }

    .sidebar-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-link {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .sidebar-link:hover { color: var(--accent); }

    .sidebar-link .arrow {
      font-size: 10px;
      color: var(--dim);
      transition: color 0.15s, transform 0.15s;
    }

    .sidebar-link:hover .arrow {
      color: var(--accent);
      transform: translate(1px, -1px);
    }

    /* Theme toggle at bottom of sidebar */
    .sidebar-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-copy {
      font-size: 9px;
      color: var(--dim);
      letter-spacing: 0.06em;
    }

    .sidebar-copy em { color: var(--accent); font-style: normal; }

    #theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--dim);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    #theme-toggle:hover { color: var(--heading); }
    #theme-toggle svg { width: 13px; height: 13px; }

    #icon-sun  { display: none; }
    #icon-moon { display: block; }
    html.light #icon-sun  { display: block; }
    html.light #icon-moon { display: none; }

    /* ── Main content ── */
    .content {
      padding: 48px 56px;
    }

    .content-section {
      margin-bottom: 56px;
    }

    .content-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 20px;
      transition: color 0.3s;
    }

    /* ── Project list ── */
    .project-list {
      display: flex;
      flex-direction: column;
    }

    .project-item {
      padding: 20px 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      display: block;
      transition: border-color 0.2s;
    }

    .project-item:last-child {
      border-bottom: 1px solid var(--border);
    }

    .item-num {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.08em;
      margin-bottom: 5px;
      transition: color 0.3s;
    }

    .item-title-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 6px;
    }

    .project-name {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 400;
      color: var(--heading);
      transition: color 0.2s;
    }

    .project-item:hover .project-name { color: var(--accent); }

    .project-arrow {
      font-size: 11px;
      color: var(--dim);
      transition: color 0.15s, transform 0.15s;
    }

    .project-item:hover .project-arrow {
      color: var(--accent);
      transform: translate(2px, -2px);
    }

    .project-desc {
      font-size: 11.5px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 8px;
      max-width: 560px;
      transition: color 0.3s;
    }

    .project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }

    .tag {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.04em;
      transition: color 0.3s;
    }

    .tag + .tag::before {
      content: ' · ';
      color: var(--dim);
    }

    /* ── Tab navigation ── */
    .tab-bar {
      display: flex;
      gap: 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
      transition: border-color 0.3s;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 0 0 14px 0;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Sprint list ── */
    .sprint-list {
      display: flex;
      flex-direction: column;
    }

    .sprint-item {
      padding: 18px 0;
      border-top: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .sprint-item:last-child { border-bottom: 1px solid var(--border); }

    .sprint-num {
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.08em;
      margin-bottom: 5px;
      transition: color 0.3s;
    }

    .sprint-link {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      text-decoration: none;
      margin-bottom: 6px;
    }

    .sprint-title {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 400;
      color: var(--heading);
      transition: color 0.2s;
    }

    .sprint-link:hover .sprint-title { color: var(--accent); }

    .sprint-arrow {
      font-size: 11px;
      color: var(--dim);
      transition: color 0.15s, transform 0.15s;
    }

    .sprint-link:hover .sprint-arrow {
      color: var(--accent);
      transform: translate(2px, -2px);
    }

    .sprint-date {
      font-size: 11px;
      color: var(--dim);
      font-family: var(--font-mono);
      transition: color 0.3s;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .sidebar  { animation: fadeUp 0.4s ease both; }
    .content  { animation: fadeUp 0.4s ease 0.05s both; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 36px 28px;
      }

      .content {
        padding: 36px 28px;
      }

      h1 { font-size: 30px; }
    }
  </style>

  <script>
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light');
    }
  </script>
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- Name -->
    <div class="name-block">
      <h1>
        <span class="name-first"></span> <span class="name-last"></span>
      </h1>
    </div>

    <!-- Tagline -->
    <p class="tagline"></p>

    <!-- Photo -->
    <div class="avatar" id="about">
      <img src="./images/photo.jpg" alt="Andrea Kim" style="width:100%;height:100%;object-fit:cover;object-position:center top;">
    </div>

    <!-- Contact -->
    <div class="sidebar-section" id="contact">
      <div class="sidebar-label">synapses</div>
      <div class="sidebar-links">
        <a class="sidebar-link" href="mailto:andreakim@uchicago.edu">
          <span>email</span>
          <span class="arrow">↗</span>
        </a>
        <a class="sidebar-link" href="https://www.linkedin.com/in/andrea-kim-383b08259/" target="_blank" rel="noopener">
          <span>linkedin</span>
          <span class="arrow">↗</span>
        </a>
        <a class="sidebar-link" href="https://github.com/aandreakim" target="_blank" rel="noopener">
          <span>github</span>
          <span class="arrow">↗</span>
        </a>
      </div>
    </div>

    <!-- Footer + toggle -->
    <div class="sidebar-footer">
      <span class="sidebar-copy">
        <em id="footer-name"></em> &mdash; <em id="footer-year"></em>
      </span>
      <button id="theme-toggle" aria-label="Toggle theme">
        <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

  </aside>

  <!-- ── Main content ── -->
  <main class="content">

    <!-- Tab navigation -->
    <div class="tab-bar">
      <button class="tab active" data-tab="projects">projects</button>
      <button class="tab" data-tab="neurogenesis">inducing neurogenesis</button>
    </div>

    <!-- ── Projects ── -->
    <div class="content-section" id="projects">
      <div class="content-label">projects</div>
      <div class="project-list" id="project-list"></div>
    </div>

    <!-- ── Inducing Neurogenesis ── -->
    <div class="content-section" id="neurogenesis" style="display:none;">
      <div class="sprint-list" id="sprint-list"></div>
    </div>

  </main>

</div>

<script>
  // ── Load content from JSON ──
  fetch('./data/content.json')
    .then(r => r.json())
    .then(data => {
      // Basic fields
      document.querySelector('.name-first').textContent  = data.name_first;
      document.querySelector('.name-last').textContent   = data.name_last;
      document.querySelector('.tagline').textContent     = data.bio;
      document.getElementById('footer-name').textContent = data.footer_name;
      document.getElementById('footer-year').textContent = data.footer_year;

      // Projects
      const projectList = document.getElementById('project-list');
      projectList.innerHTML = data.projects.map((p, i) => `
        <a class="project-item" href="${p.url}" target="_blank" rel="noopener">
          <div class="item-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="item-title-row">
            <span class="project-name">${p.name}</span>
            <span class="project-arrow">↗</span>
          </div>
          <p class="project-desc">${p.description}</p>
          <div class="project-tags">
            ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </a>
      `).join('');

      // Sprints
      const sprintList = document.getElementById('sprint-list');
      sprintList.innerHTML = data.sprints.map((s, i) => `
        <div class="sprint-item">
          <div class="sprint-num">${String(i + 1).padStart(2, '0')}</div>
          <a class="sprint-link" href="${s.url}" target="_blank" rel="noopener">
            <span class="sprint-title">${s.title}</span>
            <span class="sprint-arrow">↗</span>
          </a>
          <div class="sprint-date">${s.date}</div>
        </div>
      `).join('');
    })
    .catch(() => {
      // Fallback if JSON can't load (e.g. local file:// open)
      document.querySelector('.name-first').textContent = 'Andrea';
      document.querySelector('.name-last').textContent  = 'Kim';
    });

  // ── Tab switching ──
  const tabs = document.querySelectorAll('.tab');
  const sections = { projects: document.getElementById('projects'), neurogenesis: document.getElementById('neurogenesis') };

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      Object.entries(sections).forEach(([key, el]) => {
        el.style.display = key === target ? 'block' : 'none';
      });
      localStorage.setItem('active-tab', target);
    });
  });

  // Restore last active tab
  const savedTab = localStorage.getItem('active-tab');
  if (savedTab && sections[savedTab]) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === savedTab));
    Object.entries(sections).forEach(([key, el]) => {
      el.style.display = key === savedTab ? 'block' : 'none';
    });
  }

  // ── Theme toggle ──
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isLight = document.documentElement.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
  });
</script>

</body>
</html>
